<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Sana bir hediyem var 🎁</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@400;500;700&family=Caveat:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:#FAF3E7;
    --paper:#FFFCF5;
    --box:#ECCB9C;
    --box-lid:#F3D8AE;
    --box-shadow:#D9AE76;
    --ribbon:#E8580A;
    --ribbon-deep:#B8430A;
    --gold:#CC9A45;
    --blush:#F0AE93;
    --ink:#3A2A1E;
    --ink-soft:#8A7256;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100dvh;
    background:
      radial-gradient(circle at 18% 12%, rgba(240,174,147,0.35), transparent 45%),
      radial-gradient(circle at 85% 78%, rgba(204,154,69,0.22), transparent 50%),
      var(--cream);
    font-family:'DM Sans', sans-serif;
    color:var(--ink);
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }

  .scene{
    position:relative;
    z-index:2;
    min-height:100dvh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px 20px;
  }

  /* floating balloons */
  .balloon-field{
    position:fixed;
    inset:0;
    overflow:hidden;
    pointer-events:none;
    z-index:1;
  }
  .balloon{
    position:absolute;
    bottom:-120px;
    width:var(--size);
    height:calc(var(--size) * 1.2);
    border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;
    animation:balloon-rise var(--duration) linear infinite;
  }
  .balloon::before{
    content:'';
    position:absolute;
    top:18%;
    left:22%;
    width:22%;
    height:30%;
    background:rgba(255,255,255,0.45);
    border-radius:50%;
  }
  .balloon::after{
    content:'';
    position:absolute;
    bottom:-22px;
    left:50%;
    width:1px;
    height:22px;
    background:rgba(58,42,30,0.22);
  }
  @keyframes balloon-rise{
    0%{transform:translate(0,0) rotate(0deg); opacity:0;}
    8%{opacity:0.85;}
    25%{transform:translate(18px,-28vh) rotate(4deg);}
    50%{transform:translate(-14px,-56vh) rotate(-4deg);}
    75%{transform:translate(16px,-84vh) rotate(3deg);}
    92%{opacity:0.85;}
    100%{transform:translate(0,-118vh) rotate(0deg); opacity:0;}
  }

  .stage{
    position:relative;
    width:100%;
    max-width:380px;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
  }

  .eyebrow{
    font-size:0.8rem;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:var(--ink-soft);
    font-weight:700;
    margin:0 0 18px;
  }

  /* hanging gift tag */
  .tag{
    font-family:'Caveat', cursive;
    font-size:1.4rem;
    color:var(--ink);
    background:var(--paper);
    padding:6px 18px 10px;
    border-radius:10px 10px 10px 2px;
    box-shadow:0 6px 14px rgba(58,42,30,0.12);
    transform:rotate(-7deg);
    margin-bottom:8px;
    position:relative;
    transition:opacity .4s ease, transform .4s ease;
  }
  .tag::after{
    content:'';
    position:absolute;
    left:14px;
    top:-10px;
    width:2px;
    height:10px;
    background:var(--ink-soft);
    opacity:0.5;
  }
  .stage.opened .tag{opacity:0; transform:rotate(-7deg) translateY(-8px); pointer-events:none;}

  /* gift box button */
  .gift{
    appearance:none;
    border:none;
    background:none;
    padding:18px;
    margin:8px 0 4px;
    cursor:pointer;
    border-radius:24px;
    transition:transform .25s ease;
  }
  .gift:hover{transform:translateY(-3px);}
  .gift:active{transform:scale(0.96);}
  .gift:focus-visible{outline:3px solid var(--ribbon); outline-offset:6px;}
  .gift[style*="pointer-events:none"]{cursor:default;}

  .box-svg{
    width:clamp(200px, 62vw, 250px);
    height:auto;
    overflow:visible;
  }

  #lid-group, #ribbon-left, #ribbon-right{
    transform-box:fill-box;
    transform-origin:center;
    transition:transform .65s cubic-bezier(.34,1.56,.64,1), opacity .45s ease .12s;
  }
  .stage.opened #lid-group{transform:translate(-8px,-58px) rotate(-20deg); opacity:0;}
  .stage.opened #ribbon-left{transform:translate(-34px,-6px) rotate(-30deg); opacity:0;}
  .stage.opened #ribbon-right{transform:translate(34px,-6px) rotate(30deg); opacity:0;}

  .hint{
    font-size:0.85rem;
    color:var(--ink-soft);
    margin:6px 0 0;
    animation:pulse 1.8s ease-in-out infinite;
    transition:opacity .2s ease;
    font-weight: bold;
  }
  .stage.opened .hint{
    opacity:0;
    animation:none;
    visibility:hidden;
  }
  @keyframes pulse{0%,100%{opacity:0.55;}50%{opacity:1;}}

  /* backdrop behind the centered popup */
  .backdrop{
    position:fixed;
    inset:0;
    background:rgba(58,42,30,0.38);
    backdrop-filter:blur(2px);
    opacity:0;
    pointer-events:none;
    transition:opacity .4s ease .15s;
    z-index:55;
  }
  .stage.opened .backdrop{opacity:1;}

  /* reveal card — centered in the viewport like a popup */
  .reveal-card{
    position:fixed;
    top:50%;
    left:50%;
    background:var(--paper);
    border-radius:24px;
    padding:34px 26px 26px;
    max-width:300px;
    width:calc(100% - 48px);
    box-shadow:0 22px 50px rgba(58,42,30,0.28);
    opacity:0;
    transform:translate(-50%, -50%) scale(0.92);
    pointer-events:none;
    transition:transform .6s cubic-bezier(.2,.85,.3,1.25) .25s, opacity .5s ease .25s;
    z-index:60;
  }
  .stage.opened .reveal-card{
    opacity:1;
    transform:translate(-50%, -50%) scale(1);
    pointer-events:auto;
  }

  .seal{
    position:absolute;
    top:-22px;
    left:50%;
    transform:translateX(-50%);
    width:44px;
    height:44px;
    border-radius:50%;
    background:var(--paper);
    color:var(--paper);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:1.1rem;
    box-shadow:0 6px 14px rgba(232,88,10,0.35);
  }

  .entry-label{
    font-size:0.78rem;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--ink-soft);
    font-weight:700;
    margin:6px 0 2px;
  }
  .entry-label .ipa{
    font-style:italic;
    text-transform:none;
    letter-spacing:0;
    font-weight:400;
  }

  .wordmark{
    font-family:'DM Serif Display', serif;
    font-size:clamp(2.1rem, 9vw, 2.6rem);
    margin:2px 0 12px;
    color:var(--ink);
  }

  .definition{
    font-size:0.98rem;
    line-height:1.55;
    color:var(--ink);
    margin:0 0 22px;
    font-weight: 500;
  }

  .cta{
    display:inline-block;
    font-family:'DM Serif Display', serif;
    font-size:1.35rem;
    letter-spacing:0.03em;
    color:var(--paper);
    text-decoration:none;
    background:linear-gradient(180deg, var(--ribbon), var(--ribbon-deep));
    padding:14px 44px;
    border-radius:999px;
    box-shadow:0 12px 26px rgba(232,88,10,0.38);
    transition:transform .2s ease, box-shadow .2s ease;
  }
  .cta:hover{transform:translateY(-2px) scale(1.03); box-shadow:0 16px 30px rgba(232,88,10,0.46);}
  .cta:active{transform:scale(0.97);}
  .cta:focus-visible{outline:3px solid var(--gold); outline-offset:4px;}

  .subcta{
    font-size:0.85rem;
    color:var(--ink-soft);
    margin:14px 0 0;
  }

  /* ambient sparkles */
  .sparkle{
    position:absolute;
    color:var(--gold);
    opacity:0.5;
    font-size:1rem;
    animation:float 4.5s ease-in-out infinite;
    pointer-events:none;
  }
  .stage.opened .sparkle{opacity:0; transition:opacity .4s ease;}
  .sparkle.s1{top:4%; left:6%; animation-delay:0s;}
  .sparkle.s2{top:14%; right:4%; animation-delay:1.1s; color:var(--blush);}
  .sparkle.s3{bottom:30%; left:0%; animation-delay:2.1s;}
  .sparkle.s4{bottom:14%; right:6%; animation-delay:0.6s; color:var(--blush);}
  @keyframes float{
    0%,100%{transform:translateY(0) rotate(0deg); opacity:0.4;}
    50%{transform:translateY(-10px) rotate(12deg); opacity:0.85;}
  }

  /* confetti */
  .confetti-layer{
    position:fixed;
    inset:0;
    pointer-events:none;
    overflow:hidden;
    z-index:50;
  }
  .confetti-piece{
    position:absolute;
    border-radius:2px;
    animation-name:confetti-fall;
    animation-timing-function:ease-out;
    animation-fill-mode:forwards;
  }
  @keyframes confetti-fall{
    0%{transform:translate(0,0) rotate(0deg); opacity:1;}
    100%{transform:translate(var(--tx), var(--ty)) rotate(var(--rot)); opacity:0;}
  }

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.01ms !important; animation-iteration-count:1 !important;}
    #lid-group, #ribbon-left, #ribbon-right, .reveal-card, .tag, .hint{transition-duration:0.2s !important;}
  }
</style>
</head>
<body>

<div class="balloon-field" id="balloonField" aria-hidden="true"></div>

<div class="scene">
  <div class="stage" id="stage">

    <span class="sparkle s1" aria-hidden="true">✦</span>
    <span class="sparkle s2" aria-hidden="true">✦</span>
    <span class="sparkle s3" aria-hidden="true">✦</span>
    <span class="sparkle s4" aria-hidden="true">✦</span>

    <p class="eyebrow">sana özel hazırlandı</p>

    <div class="tag" aria-hidden="true">paketi aç 🎀</div>

    <button class="gift" id="giftBox" aria-label="Hediyeni açmak için dokun" aria-pressed="false">
      <svg class="box-svg" viewBox="0 0 240 200" xmlns="http://www.w3.org/2000/svg">
        <!-- soft shadow under box -->
        <ellipse cx="120" cy="188" rx="92" ry="10" fill="#3A2A1E" opacity="0.08"/>

        <!-- box base -->
        <rect x="35" y="95" width="170" height="92" rx="14" fill="var(--box)"/>
        <rect x="35" y="160" width="170" height="27" rx="14" fill="var(--box-shadow)" opacity="0.35"/>
        <rect id="ribbon-left" x="111" y="95" width="9" height="92" fill="var(--ribbon)"/>
        <rect id="ribbon-right" x="120" y="95" width="9" height="92" fill="var(--ribbon)"/>

        <!-- lid + bow (animates open) -->
        <g id="lid-group">
          <rect x="27" y="78" width="186" height="28" rx="10" fill="var(--box-lid)"/>
          <rect x="111" y="78" width="9" height="28" fill="var(--ribbon)"/>
          <rect x="120" y="78" width="9" height="28" fill="var(--ribbon)"/>
          <path d="M120,82 C92,54 62,58 73,85 C80,101 106,93 120,82 Z" fill="var(--ribbon)"/>
          <path d="M120,82 C148,54 178,58 167,85 C160,101 134,93 120,82 Z" fill="var(--ribbon)"/>
          <circle cx="120" cy="82" r="11" fill="var(--gold)"/>
        </g>
      </svg>
    </button>

    <p class="hint" id="hint">Kutuya Dokun ✨</p>

    <div class="backdrop" id="backdrop" aria-hidden="true"></div>

    <div class="reveal-card" id="revealCard">
      <div class="seal" aria-hidden="true">🎀</div>
      <p class="entry-label">frage <span class="ipa">/fʁaʒ/</span> · isim</p>
      <h1 class="wordmark">FRAGE</h1>
      <p class="definition">Yeni sözlüğünü keşfetmeye <br>hazır mısın?</p>
      <a class="cta" id="ctaButton" href="#" target="_blank" rel="noopener">FRAGE</a>
      <p class="subcta">Hadi hemen butona tıkla 🫡</p>
    </div>

  </div>
</div>

<div class="confetti-layer" id="confettiLayer" aria-hidden="true"></div>

<script>
  const APP_LINK = "https://hcengiz.com/frage";

  document.getElementById('ctaButton').href = APP_LINK;

  const stage = document.getElementById('stage');
  const giftBtn = document.getElementById('giftBox');
  const confettiLayer = document.getElementById('confettiLayer');
  const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // floating background balloons
  const balloonField = document.getElementById('balloonField');
  const balloonColors = ['#E8580A', '#CC9A45', '#F0AE93', '#7FB3A3', '#E8A0BF', '#F2C94C', '#B8430A'];
  if (!reduceMotion) {
    const count = 9;
    for (let i = 0; i < count; i++){
      const b = document.createElement('div');
      b.className = 'balloon';
      const size = 30 + Math.random() * 28;
      const left = Math.random() * 96;
      const duration = 15 + Math.random() * 11;
      const delay = -Math.random() * duration;
      b.style.left = left + 'vw';
      b.style.background = balloonColors[i % balloonColors.length];
      b.style.setProperty('--size', size + 'px');
      b.style.setProperty('--duration', duration + 's');
      b.style.animationDelay = delay + 's';
      balloonField.appendChild(b);
    }
  }
  let opened = false;

  function burstConfetti(x, y){
    if (reduceMotion) return;
    const colors = ['#E8580A', '#CC9A45', '#F0AE93', '#FFFCF5'];
    const count = 26;
    for (let i = 0; i < count; i++){
      const el = document.createElement('span');
      el.className = 'confetti-piece';
      const angle = Math.random() * Math.PI * 2;
      const dist = 80 + Math.random() * 170;
      const tx = Math.cos(angle) * dist;
      const ty = Math.sin(angle) * dist - 70;
      const rot = (Math.random() * 720 - 360) + 'deg';
      const w = 5 + Math.random() * 5;
      const h = w * 1.7;
      el.style.left = x + 'px';
      el.style.top = y + 'px';
      el.style.width = w + 'px';
      el.style.height = h + 'px';
      el.style.background = colors[i % colors.length];
      el.style.setProperty('--tx', tx + 'px');
      el.style.setProperty('--ty', ty + 'px');
      el.style.setProperty('--rot', rot);
      el.style.animationDuration = (0.9 + Math.random() * 0.6) + 's';
      el.style.animationDelay = (Math.random() * 0.15) + 's';
      confettiLayer.appendChild(el);
      el.addEventListener('animationend', () => el.remove());
    }
  }

  giftBtn.addEventListener('click', () => {
    if (opened) return;
    opened = true;
    stage.classList.add('opened');
    giftBtn.setAttribute('aria-pressed', 'true');
    giftBtn.style.pointerEvents = 'none';
    const rect = giftBtn.getBoundingClientRect();
    burstConfetti(rect.left + rect.width / 2, rect.top + rect.height / 2);
  });
</script>

</body>
</html>
